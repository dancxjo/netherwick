# Bounded local cognition for physical possession on Motherbrain/Raspberry Pi 5.
# Provider I/O is single-flight and advisory; local runtime, safety, and skills
# remain authoritative for motion.
provider = "ollama"
endpoint = "http://127.0.0.1:11434"
agent_model = "llama3.2"
combobulator_model = "llama3.2"
vision_model = "gemma4"
embedding_model = "embeddinggemma"
enrich_live_images = false
allow_commands = false
allow_teaching = true
temperature = 0.2
timeout_ms = 2000
num_ctx = 2048
num_predict = 128
num_thread = 2
