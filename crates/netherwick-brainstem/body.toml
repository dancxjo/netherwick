[body]
name = "irobot-create-open-interface"
kind = "create_oi"
drive = "differential"

[create_oi]
baud = 57600
data_bits = 8
stop_bits = 1
default_mode = "safe"
sensor_probe_packet = 25

[timing]
power_toggle_pulse_ms = 500
wake_wait_ms = 5000
responsive_timeout_ms = 6000
brc_low_pulse_ms = 500
post_brc_settle_ms = 100
post_mode_settle_ms = 100
uart_byte_timeout_ms = 20
idle_blink_ms = 1000
error_blink_ms = 150
error_pause_ms = 900
