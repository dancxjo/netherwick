[body]
name = "irobot-create-open-interface"
kind = "create_oi"
drive = "differential"

[create_oi]
baud = 57600
data_bits = 8
stop_bits = 1
default_mode = "full"
sensor_probe_packet = 35
supported_sensor_packets = "0,7-31,35"
supported_modes = ["passive", "safe", "full"]

[timing]
power_toggle_pulse_ms = 500
wake_wait_ms = 5000
responsive_timeout_ms = 6000
brc_low_pulse_ms = 500
post_brc_settle_ms = 100
post_start_settle_ms = 250
post_mode_settle_ms = 100
uart_byte_timeout_ms = 20
idle_blink_ms = 1000
error_blink_ms = 150
error_pause_ms = 900

[capabilities]
verbs = [
  "ping",
  "status",
  "get_capabilities",
  "get_events",
  "arm",
  "stop",
  "disarm",
  "estop",
  "clear_estop",
  "clear_motion_queue",
  "cmd_vel",
  "drive_direct",
  "drive_arc",
  "drive_for",
  "turn_by",
  "arc_for",
  # Step-controller verbs are one-shot/TTL primitives. The host must resend
  # fresh target error/range samples to get closed-loop behavior over time.
  "creep_until",
  "scan_arc",
  "face_bearing",
  "track_bearing",
  "hold_heading",
  "turn_to_heading",
  "dock_align",
  "wall_follow",
  "wiggle_align",
  "bump_escape",
  "unstick",
  "cliff_guard",
  "heartbeat_stop",
  "request_sensors",
  "stream_sensors",
  "set_safety_policy",
  "song_define",
  "song_play",
  "define_chirp",
  "play_feedback",
  "power_state",
  "calibrate_turn",
  "reset_odometry",
  "zero_imu_orientation",
  "clear_imu_orientation",
  "set_mode",
  "set_lights",
  "restart_mpu",
  "restart_create",
  "dock",
]
sensors = [
  "bump",
  "cliff",
  "wheel_drop",
  "wall",
  "virtual_wall",
  "ir",
  "buttons",
  "battery",
  "odometry_delta",
  "imu",
]
outputs = ["song", "dock", "power_toggle", "brc"]
safety = ["bump", "cliff", "wheel_drop", "estop", "heartbeat", "tilt", "impact"]
feedback = ["ok", "error", "armed", "lost_target", "dock_seen", "danger"]
events = [
  "boot",
  "command_accepted",
  "command_rejected",
  "command_started",
  "command_completed",
  "command_interrupted",
  "command_timed_out",
  "body_power_requested",
  "body_power_changed",
  "body_mode_requested",
  "body_mode_changed",
  "telemetry_received",
  "sensor_frame_decoded",
  "motion_requested",
  "motion_stopped",
  "safety_tripped",
  "safety_cleared",
  "bump_changed",
  "cliff_changed",
  "wheel_drop_latched",
  "wheel_drop_cleared",
  "wall_changed",
  "virtual_wall_changed",
  "battery_low",
  "charging_state_changed",
  "buttons_changed",
  "ir_changed",
  "heartbeat_expired",
  "estop_latched",
  "estop_cleared",
  "imu_frame_received",
  "imu_fault",
  "tilt_changed",
  "motion_inconsistency_detected",
  "impact_detected",
  "error",
]
song_slots = 16
max_song_tones = 16

[limits]
max_linear_mm_s = 500
max_angular_mrad_s = 4000
min_ttl_ms = 10
max_ttl_ms = 60000
