[board]
name = "raspberry-pi-pico"
arch = "rp2040"

[rp2040]
xosc_crystal_freq_hz = 12000000

[pins.create_uart]
tx = "GP0"
tx_gpio = 0
tx_physical_pin = 1
rx = "GP1"
rx_gpio = 1
rx_physical_pin = 2

# r23 POWER_TOGGLE: TXS0108E channel 7 -> Create DB-25 pin 3.
[pins.power_toggle]
pin = "GP18"
gpio = 18
physical_pin = 24

# r23 TXS_OE: held disabled by an external 10 kΩ pull-down during reset.
[pins.txs_oe]
pin = "GP19"
gpio = 19
physical_pin = 25

[pins.leds]
onboard = "GP25"
onboard_gpio = 25
# GP17 is unconnected on r23; retain it only as the unused status-output role.
status = "GP17"
status_gpio = 17
status_physical_pin = 22

[pins.create_charging_indicator]
enabled = true
pin = "GP20"
gpio = 20
physical_pin = 26
active = "high"

[pins.motherbrain_reset]
enabled = false # enable only after the installed transistor/RUN circuit is continuity-tested
pin = "GP21"
gpio = 21
physical_pin = 27
active = "high_into_open_drain_stage"
target = "raspberry_pi_5_run_header"

[pins.estop]
enabled = false
pin = "GP22"
gpio = 22

[i2c.primary]
sda = "GP2"
sda_gpio = 2
sda_physical_pin = 4
scl = "GP3"
scl_gpio = 3
scl_physical_pin = 5

[imu]
enabled = true
i2c_bus = "primary"
poll_period_ms = 20
tilt_stop_mrad = 650
impact_stop_mm_s2 = 18000

[spi.primary]
mosi = "GP7"
mosi_gpio = 7
miso = "GP8"
miso_gpio = 8
sck = "GP6"
sck_gpio = 6

[pwm]
aux0 = "GP10"
aux0_gpio = 10

[adc]
battery = "GP26"
battery_gpio = 26
