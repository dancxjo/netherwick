x-pete-env: &pete-env
  RUST_LOG: ${RUST_LOG:-info}
  PETE_NEO4J_URI: ${PETE_NEO4J_URI:-bolt://neo4j:7687}
  PETE_NEO4J_HTTP_URL: ${PETE_NEO4J_HTTP_URL:-http://neo4j:7474}
  PETE_NEO4J_USER: ${PETE_NEO4J_USER:-neo4j}
  PETE_NEO4J_PASSWORD: ${PETE_NEO4J_PASSWORD:-password}
  PETE_QDRANT_URL: ${PETE_QDRANT_URL:-http://qdrant:6333}

services:
  pete-live:
    image: pete/live:latest
    build:
      context: .
      dockerfile: docker/pete/Dockerfile
    init: true
    depends_on:
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_started
    environment:
      <<: *pete-env
    command:
      - sim
      - --live
      - --live-addr
      - 0.0.0.0:8787
      - --steps
      - ${PETE_SIM_STEPS:-1000000000}
      - --ledger
      - /app/data/ledger
      - --tick-delay-ms
      - ${PETE_TICK_DELAY_MS:-100}
    ports:
      - "${PETE_LIVE_PORT:-8787}:8787"
    volumes:
      - ./data:/app/data
      - ./configs:/app/configs:ro
    profiles: ["pete"]

  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: ${PETE_NEO4J_USER:-neo4j}/${PETE_NEO4J_PASSWORD:-password}
      NEO4J_server_memory_heap_initial__size: ${NEO4J_HEAP_INITIAL:-512m}
      NEO4J_server_memory_heap_max__size: ${NEO4J_HEAP_MAX:-1G}
    ports:
      - "${PETE_NEO4J_HTTP_PORT:-7474}:7474"
      - "${PETE_NEO4J_BOLT_PORT:-7687}:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "cypher-shell -u ${PETE_NEO4J_USER:-neo4j} -p ${PETE_NEO4J_PASSWORD:-password} 'RETURN 1' >/dev/null"
        ]
      interval: 10s
      timeout: 10s
      retries: 12

  qdrant:
    image: qdrant/qdrant:v1.12.6
    ports:
      - "${PETE_QDRANT_HTTP_PORT:-6333}:6333"
      - "${PETE_QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  neo4j_data:
  neo4j_logs:
  qdrant_data:
